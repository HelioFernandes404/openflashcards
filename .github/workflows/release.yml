name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr.io requires a lowercase image path — the repo owner is already
  # lowercase (heliofernandes404) but we lowercase it anyway so this keeps
  # working if the repo is ever transferred to an owner with mixed case.
  IMAGE_OWNER: heliofernandes404

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api
            # apps/api/Dockerfile COPYs from ../fsrs-optimizer (a sibling of
            # apps/api) using paths relative to repo root
            # (apps/fsrs-optimizer/..., apps/api/...), so it needs the full
            # repo as build context rather than just apps/api.
            context: .
            dockerfile: apps/api/Dockerfile
            image: openflashcards-api
          - app: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            image: openflashcards-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
